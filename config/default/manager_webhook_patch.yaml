---
# This patch adds the args and port to enable the webhook server.
# The cert rotator in the manager handles TLS certificate generation and
# injection into the ValidatingWebhookConfiguration caBundle.

# Add the webhook server port
- op: add
  path: /spec/template/spec/containers/0/ports
  value:
    - containerPort: 9443
      name: webhook-server
      protocol: TCP

# Add --webhook-config-name arg
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --webhook-config-name=tuppr-validating-webhook-configuration

# Add --webhook-service-name arg
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --webhook-service-name=tuppr-webhook-service

# Add --webhook-secret-name arg
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --webhook-secret-name=tuppr-webhook-server-cert

# Add volumeMount for webhook server certs
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    mountPath: /tmp/k8s-webhook-server/serving-certs
    name: webhook-certs
    readOnly: true

# Add webhook-certs volume
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: webhook-certs
    secret:
      secretName: tuppr-webhook-server-cert
      optional: true
