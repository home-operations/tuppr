---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/talosctl-cluster-action/main/schema/talos-cluster.json
# One of each, so a drained workload has somewhere else to land.
apiVersion: v1alpha1
kind: TalosCluster
metadata:
  name: tuppr-e2e-1cp-1w
spec:
  kubernetes-version: v1.34.0
  controlplanes:
    count: 1
    memory: 2GiB
  workers:
    count: 1
  qemu:
    talos-version: v1.13.5
    disks:
      - virtio:10GiB
  network:
    # Explicit because patches/registry.yaml hardcodes the gateway, the first
    # address of this range. It is also talosctl's default.
    cidr: 10.5.0.0/24
  config-patches:
    cluster: ["@patches/registry.yaml"]
    controlplanes: ["@patches/talos-api-access.yaml"]
