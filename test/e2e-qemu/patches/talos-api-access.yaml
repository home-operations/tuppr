# How the controller reaches the Talos API from inside the cluster. Talos rejects this
# feature on worker machines, so it is a control plane patch rather than a cluster-wide
# one.
machine:
  features:
    kubernetesTalosAPIAccess:
      enabled: true
      allowedRoles:
        - os:admin
      allowedKubernetesNamespaces:
        - tuppr-system
