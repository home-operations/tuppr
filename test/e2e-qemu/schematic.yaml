# Image Factory schematic for the QEMU e2e cluster.
#
# None of these are functionally required. They exist to trim what the VMs
# spend on work the tests do not care about, and as a side effect they keep the
# schematic non-empty, so the nodes report a schematic id in their runtime
# ExtensionStatus. That is what makes the run exercise tuppr's
# schematic-matching guard in buildTalosUpgradeImage rather than the
# no-schematic fall-through.
#
#   dashboard  the console dashboard redraws continuously for nobody to watch
#   auditd     kernel audit logging, unused by these tests
#   mitigations  CPU side-channel mitigations cost real cycles in a guest, and
#                these VMs are destroyed at the end of the run
customization:
  extraKernelArgs:
    - talos.dashboard.disabled=1
    - talos.auditd.disabled=1
    - mitigations=off
