---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/talosctl-cluster-action/main/schema/talos-cluster.json
# HA control plane: covers etcd quorum surviving a rolling reboot. Three VMs at
# 2GiB each is the practical ceiling on a 16GB runner.
apiVersion: v1alpha1
kind: TalosCluster
metadata:
  name: tuppr-e2e-3cp-0w
spec:
  kubernetes-version: v1.34.0
  controlplanes:
    count: 3
    # Measured on an idle control plane: 694MB in use, peaking at 795MB during an
    # upgrade (the installer streams to disk rather than buffering in RAM). 2GiB
    # leaves room for the test workload without over-reserving.
    memory: 2GiB
  # Spelled out because talosctl defaults --workers to 1, not 0.
  workers:
    count: 0
  qemu:
    talos-version: v1.13.5
    disks:
      - virtio:10GiB
  network:
    # Explicit because patches/registry.yaml hardcodes the gateway, the first
    # address of this range. It is also talosctl's default.
    cidr: 10.5.0.0/24
  config-patches:
    cluster: ["@patches/registry.yaml"]
    controlplanes: ["@patches/talos-api-access.yaml"]
