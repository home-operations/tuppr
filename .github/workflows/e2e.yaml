---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  pull_request:
    branches:
      - main
    paths:
      - .mise/**
      - charts/**
      - test/**
      - Dockerfile
      - go.mod
      - go.sum
      - "**.go"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup-previous:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: test/e2e-hetzner
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: Cleanup previous runs on this branch
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: ./cleanup.sh "branch=${BRANCH}"

  e2e-test:
    needs: cleanup-previous
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        # TODO: Full matrix once hetzner limits are lifted
        # controllers: [1, 3]
        # workers: [0, 3]
        include:
          - controllers: 3
            workers: 0
          - controllers: 1
            workers: 1
    env:
      TF_VAR_hcloud_token: ${{ secrets.HETZNER_API_TOKEN }}
      TF_VAR_control_plane_count: ${{ matrix.controllers }}
      TF_VAR_worker_count: ${{ matrix.workers }}
      TF_VAR_run_id: ${{ github.run_id }}
      TF_VAR_branch_name: ${{ github.head_ref || github.ref_name }}
    defaults:
      run:
        working-directory: test/e2e-hetzner
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: OpenTofu init image
        run: tofu -chdir=tofu-image init

      - name: OpenTofu init cluster
        run: tofu -chdir=tofu init

      # The cluster module needs a concrete Hetzner image ID at plan time.
      # Keep image creation in a separate root so the module's Kubernetes
      # providers are not configured before the cluster exists.
      - name: Materialize Talos snapshot
        run: tofu -chdir=tofu-image apply -auto-approve

      - name: Apply infrastructure
        run: tofu -chdir=tofu apply -auto-approve

      - name: Run e2e tests
        run: mise exec --locked --no-deps -- ./test.sh

      - name: Cleanup all resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |-
          CLUSTER_NAME="tuppr-e2e-${TF_VAR_run_id}-${TF_VAR_control_plane_count}cp-${TF_VAR_worker_count}w"
          if [[ -z "$CLUSTER_NAME" ]]; then
            echo "ERROR: Could not determine cluster name - resources may be orphaned!"
            exit 1
          fi
          ./cleanup.sh "cluster=${CLUSTER_NAME}"
