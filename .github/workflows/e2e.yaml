---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - .mise/**
      - charts/**
      - test/**
      - Dockerfile
      - go.mod
      - go.sum
      - "**.go"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-test:
    name: E2E (${{ matrix.controllers }}cp/${{ matrix.workers }}w)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 45
    strategy:
      # The legs are independent local clusters, so a failure in one should not
      # cost us the signal from the other.
      fail-fast: false
      matrix:
        # Each entry runs on its own runner, so legs are cheap to add. What is
        # bounded is the VM count within one leg, at 2GiB per VM on a 16GB
        # runner.
        include:
          # Covers the self-hosted path: with one node tuppr upgrades the node
          # it is running on, so it skips the drain and issues the upgrade
          # without --wait. No other leg reaches that code.
          - controllers: 1
            workers: 0
          - controllers: 1
            workers: 1
          - controllers: 3
            workers: 0
    env:
      CONTROL_PLANE_COUNT: ${{ matrix.controllers }}
      WORKER_COUNT: ${{ matrix.workers }}
    defaults:
      run:
        working-directory: test/e2e-qemu
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      - name: Install QEMU
        run: |-
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils ovmf

      # Headroom for the upgrade phase, when each node unpacks the installer
      # alongside etcd and the API server. Its own file, so it adds to the
      # runner's existing swap instead of replacing it.
      - name: Enable swap
        run: |-
          sudo fallocate -l 8G /mnt/e2e-swapfile
          sudo chmod 600 /mnt/e2e-swapfile
          sudo mkswap /mnt/e2e-swapfile
          sudo swapon /mnt/e2e-swapfile

      - name: Create cluster
        run: mise exec --locked --no-deps -- ./cluster.sh

      - name: Run e2e tests
        run: mise exec --locked --no-deps -- ./test.sh
