---
name: E2E

on:
  pull_request:
    branches:
      - main
    paths:
      - charts/**
      - test/**
      - Dockerfile
      - go.mod
      - go.sum
      - "**.go"
  workflow_dispatch:

jobs:
  cleanup-previous:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/e2e-hetzner
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cleanup previous runs on this branch
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: ./cleanup.sh "branch=${{ github.head_ref || github.ref_name }}"

  e2e-test:
    needs: cleanup-previous
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # TODO: Full matrix once hetzner limits are lifted
        # controllers: [1, 3]
        # workers: [0, 3]
        include:
          - controllers: 3
            workers: 0
          - controllers: 1
            workers: 1
    env:
      TF_VAR_hcloud_token: ${{ secrets.HETZNER_API_TOKEN }}
      TF_VAR_control_plane_count: ${{ matrix.controllers }}
      TF_VAR_worker_count: ${{ matrix.workers }}
      TF_VAR_run_id: ${{ github.run_id }}
      TF_VAR_branch_name: ${{ github.head_ref || github.ref_name }}
    defaults:
      run:
        working-directory: test/e2e-hetzner
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          working_directory: test/e2e-hetzner

      - run: tofu -chdir=tofu init

      # The module's hcloud_image data source has a count expression that
      # depends on imager_image.talos_x86.image_id (known only after apply),
      # so materialize the snapshot first.
      - run: tofu -chdir=tofu apply -auto-approve -target=imager_image.talos_x86

      - run: tofu -chdir=tofu apply -auto-approve

      - run: mise exec -- ./test.sh
        working-directory: test/e2e-hetzner

      - name: Cleanup all resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          CLUSTER_NAME=$(echo "local.cluster_name" | tofu -chdir=tofu console -state=ignore.state | tr -d '"')
          if [[ -z "$CLUSTER_NAME" ]]; then
            echo "ERROR: Could not determine cluster name - resources may be orphaned!"
            exit 1
          fi
          ./cleanup.sh "cluster=${CLUSTER_NAME}"
          # cleanup.sh deletes labelled servers/LBs/networks; prune the
          # imager_image snapshot too (cleanup.sh doesn't handle images).
          hcloud image list -t snapshot -l managed-by=tuppr-e2e \
            -o noheader -o columns=id | xargs -r -I{} hcloud image delete {}
