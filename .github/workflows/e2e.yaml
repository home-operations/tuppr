---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - .mise/**
      - charts/**
      - test/**
      - Dockerfile
      - go.mod
      - go.sum
      - "**.go"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-test:
    name: E2E (${{ matrix.upgrade }} ${{ matrix.leg }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 45
    strategy:
      # The legs are independent local clusters, so a failure in one should not
      # cost us the signal from the other.
      fail-fast: false
      matrix:
        # Each entry runs on its own runner, so legs are cheap to add. What is
        # bounded is the VM count within one leg, at 2GiB per VM on a 16GB
        # runner. `leg` is a document in test/e2e-qemu describing the shape to
        # boot; `upgrade` is which controller that leg drives.
        #
        # Shape is what makes the Talos legs differ from each other: that
        # controller drains, reboots and upgrades node by node. The Kubernetes
        # one picks a single control plane node and runs one job there, so it
        # gets one leg rather than a shape sweep of its own.
        include:
          # Covers the self-hosted path: with one node tuppr upgrades the node
          # it is running on, so it skips the drain and issues the upgrade
          # without --wait. No other leg reaches that code.
          - leg: 1cp-0w
            upgrade: talos
          - leg: 1cp-1w
            upgrade: talos
          - leg: 3cp-0w
            upgrade: talos
          # A control plane and a worker, so both kinds of kubelet have to
          # converge on the new version before the CR reports Completed.
          - leg: 1cp-1w
            upgrade: kubernetes
    env:
      # Two names for one image in the runner-local registry. The nodes pull
      # registry.e2e, which the Talos mirror in patches/registry.yaml points at
      # the bridge gateway; buildx pushes to the same registry over loopback.
      # The alias matters beyond taste: test.sh splits CONTROLLER_IMAGE on ':'
      # to get the Helm repo and tag, so a host:port form would parse wrong.
      CONTROLLER_IMAGE: registry.e2e/tuppr:e2e
      PUSH_IMAGE: localhost:5000/tuppr:e2e
      # test.sh packages the chart, pushes it here, and installs it back over
      # OCI, so the run exercises the distributed artifact rather than the
      # working tree. Same runner-local registry as the image, over loopback, so
      # helm talks to it as plain HTTP.
      CHART_REGISTRY: oci://localhost:5000/charts
    defaults:
      run:
        working-directory: test/e2e-qemu
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      # Host prep is ours to do: the cluster action provisions and nothing else.
      - name: Install QEMU
        run: |-
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils ovmf

      # Headroom for the upgrade phase, when each node unpacks the installer
      # alongside etcd and the API server. Its own file, so it adds to the
      # runner's existing swap instead of replacing it.
      - name: Enable swap
        run: |-
          sudo fallocate -l 8G /mnt/e2e-swapfile
          sudo chmod 600 /mnt/e2e-swapfile
          sudo mkswap /mnt/e2e-swapfile
          sudo swapon /mnt/e2e-swapfile

      - name: Resolve toolchain versions
        id: tools
        working-directory: .
        run: echo "go=$(mise config get tools.go)" >> "$GITHUB_OUTPUT"

      - name: Start image registry
        run: docker run -d --name e2e-registry -p 5000:5000 registry:3

      # Booting the VMs and building the controller share no inputs, so they
      # overlap. They do contend for the runner's 4 vCPUs, so the saving is
      # less than the build time, but the build leaves the critical path.
      #
      # The config path is relative to the workspace: defaults.run applies to
      # run steps only. talosctl comes from mise, whose shim the action unwraps
      # itself, because the QEMU provisioner runs under sudo.
      - name: Create cluster
        id: cluster
        background: true
        uses: home-operations/talosctl-cluster-action@eb1e48773072cabb2ad57c17d1a2c8157ef78c91 # v0.1.1
        with:
          config: test/e2e-qemu/${{ matrix.leg }}.yaml

      # network=host so the builder container can reach the registry published
      # on the runner's loopback.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: network=host

      # Every leg builds a byte-identical image, so they share one cache scope.
      # Only one writes it back: concurrent cache-to writes to the same scope
      # evict each other. 3cp-0w is unique across the matrix, so it names one leg.
      - name: Build controller image
        id: image
        background: true
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ env.PUSH_IMAGE }}
          build-args: GO_VERSION=${{ steps.tools.outputs.go }}
          cache-from: type=gha,scope=e2e-controller
          cache-to: ${{ matrix.leg == '3cp-0w' && 'type=gha,mode=max,scope=e2e-controller' || '' }}

      - wait: [cluster, image]

      # The action exports KUBECONFIG and TALOSCONFIG too, but naming the outputs
      # keeps it visible which cluster the tests are pointed at, and test.sh
      # refuses to run against one it cannot identify.
      - name: Run e2e tests
        env:
          UPGRADE_KIND: ${{ matrix.upgrade }}
          CLUSTER_NAME: ${{ steps.cluster.outputs.cluster-name }}
          ENDPOINT: ${{ steps.cluster.outputs.endpoint }}
          KUBECONFIG: ${{ steps.cluster.outputs.kubeconfig }}
          TALOSCONFIG: ${{ steps.cluster.outputs.talosconfig }}
        run: mise exec --locked --no-deps -- ./test.sh
