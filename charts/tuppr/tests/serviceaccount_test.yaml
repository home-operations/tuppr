suite: serviceaccount
templates:
  - serviceaccount.tpl
tests:
  - it: should create a k8s ServiceAccount by default
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1

  - it: should create a Talos ServiceAccount
    documentIndex: 1
    asserts:
      - equal:
          path: apiVersion
          value: talos.dev/v1alpha1
      - equal:
          path: kind
          value: ServiceAccount
      - equal:
          path: spec.roles[0]
          value: os:admin

  - it: should not create k8s ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should use custom service account name
    set:
      serviceAccount.name: custom-sa
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should add annotations
    set:
      serviceAccount.annotations:
        foo: bar
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations.foo
          value: bar
