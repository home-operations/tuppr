---
suite: prometheusrule
templates:
  - prometheusrule.tpl
tests:
  - it: should not create PrometheusRule by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PrometheusRule when enabled
    set:
      monitoring.prometheusRule.enabled: true
    asserts:
      - isKind:
          of: PrometheusRule

  - it: should have five rule groups
    set:
      monitoring.prometheusRule.enabled: true
    asserts:
      - lengthEqual:
          path: spec.groups
          count: 5

  - it: should add extra labels
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.labels:
        role: alert-rules
    asserts:
      - equal:
          path: metadata.labels.role
          value: alert-rules

  - it: should add additional labels to all rules
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.additionalRuleLabels:
        team: platform
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.team
          value: platform
      - equal:
          path: spec.groups[1].rules[0].labels.team
          value: platform
      - equal:
          path: spec.groups[2].rules[0].labels.team
          value: platform
      - equal:
          path: spec.groups[3].rules[0].labels.team
          value: platform
      - equal:
          path: spec.groups[4].rules[0].labels.team
          value: platform

  - it: should add additional annotations to all rules
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.additionalRuleAnnotations:
        runbook_url: https://runbooks.example.com/tuppr
    asserts:
      - equal:
          path: spec.groups[0].rules[0].annotations.runbook_url
          value: https://runbooks.example.com/tuppr
      - equal:
          path: spec.groups[1].rules[0].annotations.runbook_url
          value: https://runbooks.example.com/tuppr
      - equal:
          path: spec.groups[2].rules[0].annotations.runbook_url
          value: https://runbooks.example.com/tuppr
      - equal:
          path: spec.groups[3].rules[0].annotations.runbook_url
          value: https://runbooks.example.com/tuppr
      - equal:
          path: spec.groups[4].rules[0].annotations.runbook_url
          value: https://runbooks.example.com/tuppr

  - it: should let rule-level labels take precedence over additionalRuleLabels
    set:
      monitoring.prometheusRule.enabled: true
      monitoring.prometheusRule.additionalRuleLabels:
        severity: warning
        team: platform
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical
      - equal:
          path: spec.groups[0].rules[0].labels.team
          value: platform
