suite: service
templates:
  - service.tpl
tests:
  - it: should always create the metrics service (single operational port)
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should default the metrics port to 8081
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8081
      - equal:
          path: spec.ports[0].targetPort
          value: metrics

  - it: should use correct metrics port
    set:
      controller.metrics.port: 9090
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
