suite: deployment
templates:
  - deployment.tpl
tests:
  - it: should be a Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/tuppr:0.0.0

  - it: should use custom image tag
    set:
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/tuppr:1.2.3

  - it: should set replicas from values
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532

  - it: should set container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should include webhook port when enabled
    set:
      webhook.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: should not include webhook port when disabled
    set:
      webhook.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: should include metrics port when enabled
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8080
            protocol: TCP

  - it: should include health port
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: health
            containerPort: 8081
            protocol: TCP

  - it: should set liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: should set tolerations
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

  - it: should use system-node-critical priority class
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-node-critical

  - it: should pass extra env vars
    set:
      env:
        - name: FOO
          value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar

  - it: should mount additional volumes
    set:
      volumes:
        - name: extra
          emptyDir: {}
      volumeMounts:
        - name: extra
          mountPath: /extra
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra
            mountPath: /extra
