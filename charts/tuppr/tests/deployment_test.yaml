suite: deployment
templates:
  - deployment.tpl
tests:
  - it: should be a Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/tuppr:0.0.0

  - it: should use custom image tag
    set:
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/tuppr:1.2.3

  - it: should pin the image by digest when set, overriding the tag
    set:
      image.tag: "1.2.3"
      image.digest: "sha256:abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/tuppr@sha256:abc123

  - it: should set replicas from values
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532

  - it: should set container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should include webhook port when enabled
    set:
      webhook.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: should not include webhook port when disabled
    set:
      webhook.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: should include metrics port when enabled
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8081
            protocol: TCP

  - it: should co-host probes on the metrics port by default (no separate health port)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: health
            containerPort: 8081
            protocol: TCP

  - it: should expose a dedicated health port when metrics are served securely
    set:
      controller.metrics.secure: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: health
            containerPort: 8081
            protocol: TCP

  - it: should expose a dedicated health port when metrics are disabled
    set:
      controller.metrics.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: health
            containerPort: 8081
            protocol: TCP
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8081
            protocol: TCP

  - it: should pass plain-HTTP metrics and probe bind flags
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8081
      - contains:
          path: spec.template.spec.containers[0].args
          content: --health-probe-bind-address=:8081
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-secure=false

  - it: should set liveness and readiness probes on the shared port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8081

  - it: should set tolerations
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

  - it: should tolerate the cordon taint so it can run on a cordoned node
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node.kubernetes.io/unschedulable
            operator: Exists
            effect: NoSchedule

  - it: should inject the controller pod name via downward API
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONTROLLER_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name

  - it: should use system-node-critical priority class by default
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-node-critical

  - it: should use custom priority class
    set:
      priorityClassName: my-custom-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: my-custom-priority

  - it: should not set priority class when empty
    set:
      priorityClassName: ""
    asserts:
      - notExists:
          path: spec.template.spec.priorityClassName

  - it: should pass extra env vars
    set:
      env:
        - name: FOO
          value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar

  - it: should mount additional volumes
    set:
      volumes:
        - name: extra
          emptyDir: {}
      volumeMounts:
        - name: extra
          mountPath: /extra
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra
            mountPath: /extra
